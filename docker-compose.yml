services:
  ai-service:
    build: ./ai-service
    restart: always
    volumes:
      - uploads:/app/uploads
      - ./ai-service/models:/app/models

  backend:
    build: ./backend
    env_file: .env
    depends_on:
      - postgres
      - ai-service
    restart: always
    volumes:
      - uploads:/app/uploads

  frontend:
    build: ./frontend
    restart: always

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ai_inspection
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
      - frontend
    restart: always

volumes:
  pgdata:
  uploads:

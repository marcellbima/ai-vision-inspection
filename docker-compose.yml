services:
  ai-service:
    build: ./ai-service
    restart: always

  backend:
    build: ./backend
    env_file: .env
    depends_on:
      - postgres
    restart: always

  frontend:
    build: ./frontend
    restart: always

  postgres:
    image: postgres:15-alpine
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - backend
      - frontend
    restart: always

volumes:
  pgdata:

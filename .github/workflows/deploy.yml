name: Deploy to Production

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy
        run: |
          cd ~/ai-vision-inspection
          git pull origin main
          docker compose down
          docker compose build --no-cache
          docker compose up -d
          docker compose ps
